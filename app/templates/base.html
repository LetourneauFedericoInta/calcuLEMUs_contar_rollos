<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Counting System - Conteo de Rollizos</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#070a13',
                            panel: '#0d1326',
                            border: '#1f294d',
                            accent: '#10b981', // Emerald green
                            highlight: '#3b82f6', // Bright blue
                            error: '#ef4444',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-brand-dark text-slate-100 min-h-screen flex flex-col font-sans selection:bg-brand-accent selection:text-brand-dark">

    <!-- Top Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-brand-panel/85 backdrop-blur-md border-b border-brand-border/60 py-4 px-6 flex justify-between items-center shadow-lg shadow-black/20">
        <a href="/" class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-accent to-emerald-400 flex items-center justify-center text-brand-dark shadow-md shadow-brand-accent/25 transition-transform group-hover:scale-105">
                <i class="fa-solid fa-tree text-lg font-bold"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                    Conteo de Rollizos <span class="text-xs bg-brand-accent/15 text-brand-accent font-semibold px-2 py-0.5 rounded-full border border-brand-accent/30">v2.0</span>
                </h1>
                <p class="text-xs text-slate-400">Drone Imagery Automated Log Counting</p>
            </div>
        </a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-slate-300 hover:text-white transition-colors text-sm font-medium flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-slate-400"></i> Dashboard
            </a>
            <span class="h-4 w-px bg-brand-border"></span>
            <div class="text-xs text-slate-400 flex items-center gap-1">
                <i class="fa-regular fa-clock"></i> Local Time: 2026-05-26
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="flex-grow flex flex-col">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-brand-dark border-t border-brand-border/40 py-6 px-8 text-center text-slate-500 text-xs mt-auto">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <p>&copy; 2026 INTA Computer Vision Lab. All rights reserved.</p>
            <p class="flex items-center gap-2">
                <span>Production Mode</span>
                <span class="w-2 h-2 rounded-full bg-brand-accent animate-pulse"></span>
            </p>
        </div>
    </footer>

</body>
</html>
